<div class="reg-page">
  <div class="reg-left">
    <img
      class="reg-illustration"
      alt="Working woman"
      src="..\assets\woman-register.png"
    />
    <h2>Join Task Manager</h2>
    <p>Create your account and start managing tasks efficiently.</p>
  </div>

  <div class="reg-right">
    <form class="reg-form" (ngSubmit)="register()">
      <div class="reg-heading">
        <h1 class="reg-title">Sign<span class="up">up</span></h1>
        <p class="reg-subtitle">Get yourself <strong class="up">TODO</strong> more</p>
      </div>

      <div class="form-field-wrap">
        <input
          class="reg-input"
          type="text"
          placeholder="First Name"
          [(ngModel)]="firstName"
          name="firstName"
          required
          (input)="validateInput('firstName')"
          [ngClass]="{'valid': firstNameValid, 'invalid': !firstNameValid && firstName.length > 0}"
        />
        <i class="fas" [ngClass]="{'fa-check-circle text-success': firstNameValid, 'fa-times-circle text-danger': !firstNameValid}"></i>
      </div>

      <div class="form-field-wrap">
        <input
          type="text"
          class="reg-input"
          placeholder="Last Name"
          [(ngModel)]="lastName"
          name="lastName"
          required
          (input)="validateInput('lastName')"
          [ngClass]="{'valid': lastNameValid, 'invalid': !lastNameValid && lastName.length > 0}"
        />
        <i class="fas" [ngClass]="{'fa-check-circle text-success': lastNameValid, 'fa-times-circle text-danger': !lastNameValid}"></i>
      </div>

      <div class="form-field-wrap">
        <input
          type="email"
          class="reg-input"
          placeholder="Email"
          [(ngModel)]="email"
          name="email"
          required
          (input)="validateInput('email')"
          [ngClass]="{'valid' : emailValid, 'invalid': !emailValid && email.length > 0}"
        />
        <i class="fas" [ngClass]="{'fa-check-circle text-success':emailValid, 'fa-times-circle text-danger': !emailValid}"></i>
      </div>

      <div class="form-field-wrap">
        <input
          type="text"
          class="reg-input"
          placeholder="Username"
          [(ngModel)]="username"
          name="username"
          required
          (input)="validateInput('username')"
          [ngClass]="{'valid': usernameValid, 'invalid': !usernameValid && username.length > 0}"
        />
        <i class="fas" [ngClass]="{'fa-check-circle text-success': usernameValid, 'fa-times-circle text-danger': !usernameValid}"></i>
      </div>

      <div class="form-field-wrap">
        <input
          type="password"
          class="reg-input"
          placeholder="Password"
          [(ngModel)]="password"
          name="password"
          required
          (input)="validateInput('password')"
          [ngClass]="{'valid': passwordValid, 'invalid': !passwordValid && password.length > 0}"
        />
        <i class="fas" [ngClass]="{'fa-check-circle text-success': passwordValid, 'fa-times-circle text-danger': !passwordValid}"></i>
      </div>

      <div class="form-field-wrap">
        <input
          type="password"
          class="reg-input"
          placeholder="Confirm Password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          (input)="validateInput('confirmPassword')"
          [ngClass]="{'valid': confirmPasswordValid, 'invalid': !confirmPasswordValid && confirmPassword.length > 0}"
        />
        <i class="fas" [ngClass]="{'fa-check-circle text-success': confirmPasswordValid, 'fa-times-circle text-danger': !confirmPasswordValid}"></i>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms" name="terms" value="terms" required />
        <label for="terms">Accept <span class="learn-more">Terms &amp; Conditions</span></label>
      </div>

      <button class="btn-register" type="submit" [disabled]="isSubmitting">Register</button>

      <div *ngIf="message" class="alert-error">{{ message }}</div>

      <p class="signin-text">
        Already have an account?
        <a class="signin" href="/login">Sign in</a>
      </p>
    </form>
  </div>
</div>
