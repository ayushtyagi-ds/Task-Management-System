<div class="time-bar">
  <div class="time-bar-items">
    <span class="time-label">{{ dayOfWeek }}</span>
    <span class="time-separator">|</span>
    <span class="time-label">{{ currentDate }}</span>
    <span class="time-separator">|</span>
    <span class="time-label">{{ currentTime }}</span>
  </div>
  <img class="bell-icon" alt="notifications" src="../../assets/bellSimple.svg" />
</div>
