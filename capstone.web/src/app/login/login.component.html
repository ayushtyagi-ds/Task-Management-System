<div class="login-page">
  <div class="login-left">
    <img src="../../assets/young-woman-working-at-desk.png" alt="working at desk" />
    <h2>Manage your tasks efficiently</h2>
    <p>Stay organized, track progress, and collaborate with your team.</p>
  </div>

  <div class="login-right">
    <form class="login-form" (ngSubmit)="login()">
      <h1 class="login-title">Sign<span class="in">in</span></h1>
      <p class="login-subtitle">Sign in to manage your tasks</p>

      <div class="form-group">
        <input
          type="text"
          class="form-input"
          placeholder="Username"
          id="username"
          [(ngModel)]="username"
          name="username"
          required
          autofocus
          (input)="validateInput('username')"
        />
        <i class="fas" [ngClass]="{'fa-check-circle valid': usernameValid, 'fa-times-circle invalid': !usernameValid}"></i>
      </div>

      <div class="form-group">
        <input
          type="password"
          class="form-input"
          id="password"
          placeholder="Password"
          [(ngModel)]="password"
          name="password"
          required
          (input)="validateInput('password')"
        />
        <i class="fas" [ngClass]="{'fa-check-circle valid': passwordValid, 'fa-times-circle invalid': !passwordValid}"></i>
      </div>

      <a href="#" class="forgot-link">Forgot Password?</a>

      <button class="btn-signin" type="submit">Sign in</button>

      <div *ngIf="errorMessage" class="error-message">
        <mat-icon>error_outline</mat-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <p class="register-text">
        Do not have an account?
        <a href="registration" class="register-link">Create an account.</a>
      </p>
    </form>
  </div>
</div>
